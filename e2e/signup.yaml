appId: com.ourakin.app
# Phase 4 smoke flow: signup → email verify (auto-confirmed in dev) → identifier reveal → skip onboarding → feed.
# Prerequisite: SUPABASE_AUTH_AUTO_CONFIRM=true in the local .env.local (dev/staging only, NEVER production).
# Run: maestro test e2e/signup.yaml
---
# 1. Launch fresh —————————————————————————————————
- launchApp:
    clearState: true
    arguments:
      AppleLanguages: '(en)'
      AppleLocale: en_US
      E2E: '1'
# 2. Welcome screen — wait for Metro bundle + splash before asserting
- extendedWaitUntil:
    visible:
      text: 'Make an account'
    timeout: 60000
- tapOn: 'Make an account'

# 3. Signup form
- assertVisible: 'Make an account'
- tapOn:
    id: 'signup-email'
- inputText: 'testsignup${js:Date.now()}@ourakin.app'
- tapOn:
    id: 'signup-password'
- inputText: 'TestPass123!'
- tapOn:
    id: 'signup-confirm-password'
- inputText: 'TestPass123!'
- tapOn:
    text: 'Close'
    optional: true
- hideKeyboard
- tapOn: 'I am 18 or older.'
- tapOn: 'Continue'

# 4. Email verify (auto-confirmed in dev → polls quickly)
- assertVisible: 'Check your email'
# In dev, Supabase auto-confirms — the polling should redirect within ~5s.
- waitForAnimationToEnd

# 5. Identifier reveal
- assertVisible:
    text: "This is who you'll be here"
- assertVisible: 'This is me'
# Accept the identifier
- tapOn: 'This is me'

# 6. Onboarding screens
- assertVisible: 'Anonymous, by design'
- tapOn: 'Skip'

# 7. Feed — golden path landing
- assertVisible: 'akin'
