    timeout: 60000
- tapOn: 'Make an account'
- tapOn: 'Make an account'
- tapOn:
    id: 'signup-email'
- inputText: 'e2ec1${js:Date.now()}@ourakin.app'
- tapOn:
    id: 'signup-password'
- inputText: 'TestPass123!'
- tapOn:
    id: 'signup-confirm-password'
- inputText: 'TestPass123!'
- tapOn:
    id: 'signup-title'
- tapOn: 'I am 18 or older.'
- tapOn: 'Continue'
- assertVisible: 'Check your email'
- waitForAnimationToEnd
- assertVisible:
    text: "This is who you'll be here"
- tapOn: 'This is me'
- assertVisible: 'Anonymous, by design'
- tapOn: 'Skip'
- extendedWaitUntil:
    visible:
      id: 'tab-read'
    timeout: 10000
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: 'Near-full E2E post'
    timeout: 15000
- tapOn:
    text: 'Near-full E2E post'
- extendedWaitUntil:
    visible:
      id: 'post-title'
    timeout: 10000
- tapOn:
    id: 'post-reply-input'
- inputText: 'E2E: first comment.'
- tapOn:
    id: 'post-send-button'
- extendedWaitUntil:
    visible:
      text: 'E2E: first comment.'
    timeout: 10000
- waitForAnimationToEnd

