appId: com.ourakin.app
# Phase 5 smoke flow: signup → onboarding → feed → write tab → fill composer → post → see it.
# Prerequisite: SUPABASE_AUTH_AUTO_CONFIRM=true in the local .env.local (dev/staging only, NEVER production).
# Run: maestro test e2e/create-post.yaml
---
# 1. Launch fresh —————————————————————————————————
# Force English locale so assertions match regardless of simulator language setting.
- launchApp:
    clearState: true
    arguments:
      AppleLanguages: '(en)'
      AppleLocale: en_US
      E2E: '1'
# Wait for Metro to finish bundling and the app to render its first screen.
# clearState wipes the JS cache so every fresh launch re-downloads the full bundle from Metro.
# extendedWaitUntil retries for up to 60 s — enough time for a cold bundle download.
- extendedWaitUntil:
    visible:
      text: 'Make an account'
    timeout: 60000

# 2. Sign up a fresh user (auto-confirmed in dev)
- tapOn: 'Make an account'
- tapOn: 'Make an account'
- tapOn:
    id: 'signup-email'
- inputText: 'testcreate${js:Date.now()}@ourakin.app'
- tapOn:
    id: 'signup-password'
- inputText: 'TestPass123!'
- tapOn:
    id: 'signup-confirm-password'
- inputText: 'TestPass123!'
# Dismiss iOS "Use Strong Password?" system sheet if it appeared.
# The sheet is a native UIKit overlay — hideKeyboard doesn't reach it.
# optional: true means the step is skipped silently if the button isn't there.
- tapOn:
    text: 'Close'
    optional: true
- hideKeyboard
- tapOn: 'I am 18 or older.'
- tapOn: 'Continue'

# 3. Email verify auto-confirms in dev
- assertVisible: 'Check your email'
- waitForAnimationToEnd

# 4. Identifier reveal → accept
- assertVisible:
    text: "This is who you'll be here"
- tapOn: 'This is me'

# 5. Onboarding → skip to feed
- assertVisible: 'Anonymous, by design'
- tapOn: 'Skip'

# 6. Feed loaded — open Write tab
- assertVisible: 'akin'
- waitForAnimationToEnd
# Extra guard: re-assert feed is visible right before tapping Write, so any
# unexpected re-routing (e.g. stale SIGNED_IN handler) is caught here, not on tab-write.
- assertVisible: 'akin'
# tapOn by testID: TabButton (our custom tabBarButton) sets testID directly on
# the Pressable, so Maestro finds it reliably without coordinate guessing.
- tapOn:
    id: 'tab-write'

# 7. Guidelines sheet appears on first post — continue
- assertVisible: 'Before you post.'
- tapOn: 'Continue'

# 8. Composer — pick a category
- tapOn: 'Category'
# CategoryPickerSheet uses a sibling-overlay pattern (overlay Pressable is self-closing,
# accessible={false}; sheet View is a sibling). extendedWaitUntil polls until the title
# testID is in the XCTest accessibility tree.
- extendedWaitUntil:
    visible:
      id: 'category-picker-title'
    timeout: 5000
- tapOn: 'Vent Space'

# 9. Fill in title + body
- tapOn:
    id: 'create-title-input'
- inputText: 'E2E test post title'
- tapOn:
    id: 'create-body-input'
- inputText: 'This post was created by the create-post Maestro flow.'

# 10. Submit
- tapOn: 'Post'

# 11. Lands on the post detail screen — createPost.mutateAsync is a Supabase network call
# followed by router.replace, so give it up to 15 s before declaring failure.
- extendedWaitUntil:
    visible:
      text: 'E2E test post title'
    timeout: 15000

# 12. Back to feed — confirm the new post is in the list
# Use the TopBar back button (accessibilityLabel="Back") rather than the hardware back
# gesture — the post screen sits in a Tabs navigator, not a UINavigationController stack,
# so the swipe-back gesture has nothing to attach to on iOS.
- tapOn:
    label: 'Back'
- extendedWaitUntil:
    visible:
      text: 'E2E test post title'
    timeout: 5000
